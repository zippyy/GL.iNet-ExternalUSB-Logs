# /etc/usb-log-mirror.conf
# Optional overrides for usb-log-mirror.sh

# Primary preferred mount point (if not available, auto-detection can choose another)
USB_MOUNT="/mnt/sda1"

# Set to 1 to auto-detect external USB storage if USB_MOUNT is unavailable
AUTO_DETECT_STORAGE="1"

# Optional preferred candidates (space-separated)
PREFERRED_MOUNTS="/mnt/sda1 /mnt/sdb1"

# Local fallback used when no USB/SD writable mount is available
FALLBACK_LOCAL_DIR="/logs-backup"

# Log location on selected storage mount
LOG_SUBDIR="gl-usb-logs"
LOG_NAME="system.log"
CELLULAR_LOG_NAME="cellular.log"
MODEM_LOG_NAME="modem.log"

# First existing readable path is mirrored for each log type
CELLULAR_LOG_CANDIDATES="/tmp/quectel_slic_daemon.log /tmp/gl_modem_traffic/cpu/total_5g /tmp/gl_modem_traffic/cpu/total_4g /var/log/cellular.log /tmp/cellular.log /tmp/run/cellular.log"
MODEM_LOG_CANDIDATES="/tmp/quectel_voice_server.log /var/log/modem.log /tmp/modem.log /tmp/run/modem.log"

# Rotation and retry behavior
MAX_SIZE_KB="5120"
MAX_FILES="5"
RETRY_SECONDS="10"
CHECK_EVERY_LINES="50"
